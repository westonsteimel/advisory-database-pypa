summary: SQLAlchemyDA unauthenticated arbitrary SQL query execution
details: "### Impact\nThe vulnerability allows unauthenticated execution of arbitrary
  SQL statements on the database the SQLAlchemyDA instance is connected to. All users
  are affected.\n\n### Patches\nThe problem has been patched in version 2.2. \n\n
  ### Workarounds\nThere is no workaround. All users are urged to upgrade to version
  2.2\n"
