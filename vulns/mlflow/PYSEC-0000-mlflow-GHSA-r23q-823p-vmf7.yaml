summary: MLflow Command Injection vulnerability
details: A command injection vulnerability exists in MLflow's model serving container
  initialization code, specifically in the `_install_model_dependencies_to_env()`
  function. When deploying a model with `env_manager=LOCAL`, MLflow reads dependency
  specifications from the model artifact's `python_env.yaml` file and directly interpolates
  them into a shell command without sanitization. This allows an attacker to supply
  a malicious model artifact and achieve arbitrary command execution on systems that
  deploy the model. The vulnerability affects versions 3.8.0 and is fixed in version
  3.8.1.
