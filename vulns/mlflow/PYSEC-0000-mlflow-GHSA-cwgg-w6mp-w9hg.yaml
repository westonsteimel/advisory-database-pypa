id: PYSEC-0000-mlflow-GHSA-cwgg-w6mp-w9hg
summary: MLFlow unsafe deserialization
details: "Deserialization of untrusted data can occur in versions of the MLflow platform\
  \ running version 2.5.0 or newer, enabling a maliciously uploaded Langchain AgentExecutor\
  \ model to run arbitrary code on an end user\u2019s system when interacted with."
