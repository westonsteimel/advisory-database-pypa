summary: MLflow Use of Default Password Authentication Bypass Vulnerability
details: "This vulnerability allows remote attackers to bypass authentication on affected
  installations of MLflow. Authentication is not required to exploit this vulnerability.\n
  \nThe specific flaw exists within the basic_auth.ini file. The file contains hard-coded
  default credentials. An attacker can leverage this vulnerability to bypass authentication
  and execute arbitrary code in the context of the administrator."
