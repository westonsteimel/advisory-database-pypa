summary: MLFlow path traversal vulnerability
details: A path traversal vulnerability exists in the `extract_archive_to_dir` function
  within the `mlflow/pyfunc/dbconnect_artifact_cache.py` file of the mlflow/mlflow
  repository. This vulnerability, present in versions before v3.7.0, arises due to
  the lack of validation of tar member paths during extraction. An attacker with control
  over the tar.gz file can exploit this issue to overwrite arbitrary files or gain
  elevated privileges, potentially escaping the sandbox directory in multi-tenant
  or shared cluster environments.
