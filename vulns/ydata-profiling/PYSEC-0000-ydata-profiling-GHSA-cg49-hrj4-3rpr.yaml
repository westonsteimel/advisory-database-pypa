id: PYSEC-0000-ydata-profiling-GHSA-cg49-hrj4-3rpr
summary: ydata unsafe deserialization
details: Deseriliazation of untrusted data can occur in versions 3.7.0 or newer of
  Ydata's ydata-profiling open-source library, enabling a maliciously crafted dataset
  to run arbitrary code on an end user's system when loaded.
