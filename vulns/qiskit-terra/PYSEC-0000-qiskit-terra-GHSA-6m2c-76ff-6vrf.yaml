summary: Qiskit allows arbitrary code execution decoding QPY format versions < 13
details: "### Impact\n\nA maliciously crafted QPY file can potentially execute arbitrary-code
  embedded in the payload without privilege escalation when deserializing QPY formats
  < 13. A python process calling Qiskit's `qiskit.qpy.load()` function could potentially
  execute any arbitrary Python code embedded in the correct place in the binary file
  as part of a specially constructed payload.\n\n### Patches\n\nFixed in Qiskit 1.4.2
  and in Qiskit 2.0.0rc2"
