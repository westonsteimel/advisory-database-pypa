details: A vulnerability classified as problematic has been found in PyTorch 2.6.0.
  Affected is the function torch.jit.jit_module_from_flatbuffer. The manipulation
  leads to memory corruption. Local access is required to approach this attack. The
  exploit has been disclosed to the public and may be used.
