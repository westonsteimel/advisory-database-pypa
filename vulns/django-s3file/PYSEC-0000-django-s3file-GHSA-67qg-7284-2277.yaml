summary: django-s3file is vulnerable to relative path traversal
details: "### Impact\n`S3FileMiddleware` is vulnerable to relative path traversal
  attacks, where an attacker can use a modified request to escape pre-signed upload
  locations and have the Django application load files from random locations into
  `request.FILES`\n\nDepending on how files are handled, this may lead to confidentiality
  and integrity issues.\n\n### Patches\nDjango-S3File urges all users to update to
  a patched version >=7.0.2."
