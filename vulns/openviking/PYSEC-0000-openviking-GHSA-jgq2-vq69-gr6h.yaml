summary: 'OpenViking: Unauthenticated remote bot control via OpenAPI HTTP routes'
details: OpenViking prior to commit c7bb167 contains an authentication bypass vulnerability
  in the VikingBot OpenAPI HTTP route surface where the authentication check fails
  open when the api_key configuration value is unset or empty. Remote attackers with
  network access to the exposed service can invoke privileged bot-control functionality
  without providing a valid X-API-Key header, including submitting attacker-controlled
  prompts, creating or using bot sessions, and accessing downstream tools, integrations,
  secrets, or data accessible to the bot.
