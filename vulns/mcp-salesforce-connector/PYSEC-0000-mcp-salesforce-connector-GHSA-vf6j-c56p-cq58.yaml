id: PYSEC-0000-mcp-salesforce-connector-GHSA-vf6j-c56p-cq58
summary: MCP-Salesforce's arbitrary attribute access leads to disclosure of Salesforce
  auth token
details: |-
  ### Impact
  _Disclosure of Salesforce OAuth bearer tokens used by the MCP._

  ### Patches
  _fix applied in 0.1.10_

  ### Workarounds
  _Rotate any Salesforce tokens/credentials used by MCP-Salesforce._
