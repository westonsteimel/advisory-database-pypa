details: "The Keras Model.load_model\_method can be exploited to achieve arbitrary\
  \ code execution, even with safe_mode=True.\n\nOne can create a specially crafted\
  \ .h5/.hdf5\_model archive that, when loaded via Model.load_model, will trigger\
  \ arbitrary code to be executed.\n\nThis is achieved by crafting a special .h5\_\
  archive file that uses the Lambda\_layer feature of keras which allows arbitrary\
  \ Python code in the form of pickled code. The vulnerability comes from the fact\
  \ that the safe_mode=True\_option is not honored when reading .h5\_archives.\n\n\
  Note that the .h5/.hdf5\_format is a legacy format supported by Keras 3 for backwards\
  \ compatibility."
