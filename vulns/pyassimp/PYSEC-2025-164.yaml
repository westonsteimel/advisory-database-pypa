details: A vulnerability was found in Open Asset Import Library Assimp 5.4.3. It has
  been classified as critical. Affected is the function SceneCombiner::MergeScenes
  of the file code/AssetLib/LWS/LWSLoader.cpp of the component LWS File Handler. The
  manipulation leads to out-of-bounds read. It is possible to launch the attack remotely.
  The exploit has been disclosed to the public and may be used.
