details: A vulnerability classified as critical was found in Open Asset Import Library
  Assimp 5.4.3. This vulnerability affects the function Assimp::GetNextLine in the
  library ParsingUtils.h of the component File Handler. The manipulation leads to
  stack-based buffer overflow. The attack can be initiated remotely. The exploit has
  been disclosed to the public and may be used.
