details: A vulnerability was found in Open Asset Import Library Assimp 5.4.3 and classified
  as problematic. This issue affects the function fast_atoreal_move in the library
  include/assimp/fast_atof.h of the component CSM File Handler. The manipulation leads
  to out-of-bounds read. The attack may be initiated remotely. The exploit has been
  disclosed to the public and may be used.
