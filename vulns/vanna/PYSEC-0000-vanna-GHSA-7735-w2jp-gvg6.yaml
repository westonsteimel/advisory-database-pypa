details: "The Vanna library uses a prompt function to present the user with visualized\
  \ results, it is possible to alter the prompt using prompt injection and run arbitrary\
  \ Python code instead of the intended visualization code. Specifically - allowing\
  \ external input to the library\u2019s \u201Cask\u201D method with \"visualize\"\
  \ set to True (default behavior) leads to remote code execution."
