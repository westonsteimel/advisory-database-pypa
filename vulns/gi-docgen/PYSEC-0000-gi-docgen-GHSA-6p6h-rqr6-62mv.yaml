id: PYSEC-0000-gi-docgen-GHSA-6p6h-rqr6-62mv
summary: GI-DocGen vulnerable to Reflected XSS via unescaped query strings
details: "A flaw was found in GI-DocGen. This vulnerability allows arbitrary JavaScript\
  \ execution in the context of the page \u2014 enabling DOM access, session cookie\
  \ theft and other client-side attacks \u2014 via a crafted URL that supplies a malicious\
  \ value to the q GET parameter (reflected DOM XSS)."
