id: PYSEC-0000-openexr-GHSA-qxh9-r8xw-7v99
summary: OpenEXR invalid write
details: In OpenEXR 2.2.0, an invalid write of size 8 in the storeSSE function in
  ImfOptimizedPixelReading.h could cause the application to crash or execute arbitrary
  code.
