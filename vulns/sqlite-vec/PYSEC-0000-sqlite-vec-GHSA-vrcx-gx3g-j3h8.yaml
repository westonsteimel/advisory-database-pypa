id: PYSEC-0000-sqlite-vec-GHSA-vrcx-gx3g-j3h8
summary: Heap-based Buffer Overflow in sqlite-vec
details: sqlite-vec v0.1.1 was discovered to contain a heap buffer overflow via the
  npy_token_next function. This vulnerability allows attackers to cause a Denial of
  Service (DoS) via a crafted file.
