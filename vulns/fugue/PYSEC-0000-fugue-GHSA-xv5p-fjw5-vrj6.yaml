id: PYSEC-0000-fugue-GHSA-xv5p-fjw5-vrj6
summary: "Fugue is Vulnerable to Remote Code Execution\_by Pickle Deserialization\
  \ via FlaskRPCServer"
details: "### Summary\nThe Fugue framework implements an RPC server system for distributed\
  \ computing operations. In the core\_functionality of the RPC server implementation,\
  \ I\_found that\_the\__decode()\_function in\_fugue/rpc/flask.py\_directly uses\_\
  cloudpickle.loads()\_to deserialize data\_without any sanitization. This creates\
  \ a remote code execution vulnerability when malicious pickle data is processed\
  \ by the RPC\_server.The vulnerability exists in the RPC communication mechanism\
  \ where the client can\_send arbitrary serialized Python objects that will be deserialized\
  \ on the server\_side, allowing\_attackers to\_execute arbitrary code\_on the victim's\
  \ machine.\n\n### Details\n_decode()\_function in\_fugue/rpc/flask.py directly uses\_\
  cloudpickle.loads()\_to deserialize data\_without any sanitization.\n\n### PoC\n\
  * Step1:\nThe victim user starts an RPC\_server binding to open network using\_\
  the Fugue framework. Here, I use the\_official RPC\_server code\_to initialize\_\
  the server. \n\n* Step2:\nThe attacker modifies\_the\__encode()\_function\_in\_\
  fugue/rpc/flask.py\_to\_inject malicious pickle data:\n\n<img width=\"740\" height=\"\
  260\" alt=\"image\" src=\"https://github.com/user-attachments/assets/6064516b-e1a6-45fa-a91c-8e276bc4a106\"\
  \ />\n\nIn this example, attacker modifies _encode to let the victim execute command\
  \ \u201Cls -l\u201D\n\n* Step 3:\nThe attacker then\_uses the RPC client to send\_\
  the malicious\_request\n\nFugue gives a demo video and the PoC in the attachment,\
  \ along with modified flask.py. When users reproduce this issue, in the server side\
  \ (as an victim), users can run python rpc_server.py.  In the client side (as an\
  \ attacker), users can first replace fugue/rpc/flask.py in pip site-packages with\
  \ provided flask.py in the attachment and then run rpc_client.py.\n\n\n### Impact\n\
  Remote code execution in the victim's machine. Once the victim starts\_the RPCServer\
  \ with network binding (especially\_0.0.0.0), an attacker on\_the network\_can gain\
  \ arbitrary code execution by connecting to the RPCServer\_and sending crafted pickle\
  \ payloads. This vulnerability allows\_for:\n\n- Complete system compromise\n- Data\
  \ exfiltration\n- Lateral movement within the network\n- Denial of service attacks\n\
  - Installation of persistent backdoors\n\n### Mitigation\n1. **Replace unsafe deserialization**:\
  \ Replace `pickle.loads()` with safer alternatives such as:\n   - JSON serialization\
  \ for simple data structures\n   - Protocol Buffers or MessagePack for complex data\n\
  \   - If pickle must be used, implement a custom `Unpickler` with a restricted `find_class()`\
  \ method that only allows whitelisted classes\n\n2. **Network security**: \n   -\
  \ If the service is intended for internal use only, bind to localhost (`127.0.0.1`)\
  \ instead of `0.0.0.0`\n   - Implement authentication and authorization mechanisms\n\
  \n3. **Security warnings**: When starting the service on public interfaces, display\
  \ clear security warnings to inform users about the risks.\n\nAttachment: https://drive.google.com/file/d/1y8bBBp7dnWoT_WHBtdB0Fts4NRUIfdWi/view?usp=sharing"
