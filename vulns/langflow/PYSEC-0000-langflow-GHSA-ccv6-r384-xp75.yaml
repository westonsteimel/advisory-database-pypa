summary: 'Langflow: BaseFileComponent-based nodes arbitrary file read with RCE exploit'
details: "### Summary\nAll components based on `BaseFileComponent` are vulnerable
  to the following vulnerability:\n1. Docling (`DoclingInlineComponent`)\n2. Docling
  Serve (`DoclingRemoteComponent`)\n3. Read File (`FileComponent`)\n4. NVIDIA Retriever
  Extraction (`NvidiaIngestComponent`)\n5. Video File (`VideoFileComponent`)\n6. Unstructured
  API (`UnstructuredComponent`)\n\nFor clarity, from now on I'll only refer to Read
  File component.\n\nThe Read File node processes user-controlled files.\nExample
  scenario is a RAG chatbot - a system that allows users of an organization to ask
  questions about documents saved in the organizations.\n\nBy controlling a files
  that are digested into the RAG, an attacker can direct the node to read *any* file
  on the file-system by absolute path.\n\nUsing this vulnerability an attacker can
  acheive RCE:\n1. Upload a file that directs the node to read Langflow's `secret_key`
  file containing the JWT token secret.\n2. This would allow the attacker then to
  simply task the Chatbot for the JWT secret.\n3. Using this secret, the attacker
  then crafts a JWT token for any user-id, bypassing authentication.\n4. Code execution
  is then trivial - simply create a new flow with \"Python Interpreter\" node, fill
  it with arbitrary Python code and execute it.\n\nTested on commit 2d67402b1dbaefcbce85a244d4a6cd5e4bda1cfe\n
  \n### Details\nThe vulnerability is in:\n`langflow/src/lfx/src/lfx/base/data/base_file.py`\n
  Specifically in `_unpack_bundle`. This function extracts tar files, which can contain
  a symlink.\nThis symlink can point to any file in the filesystem. Then, in `self.process_files()`,
  the file pointed by the symlink will be parsed and saved into the RAG.\nThis can
  be done with unlimited number of symlinks in the same tar which can also be useful
  in some scenarios.\n\nSuggestd fix - iterate over the files and make sure all are
  regular files or directories.\n\n\n### PoC\nReproduction:\n1. Create a flow with
  Read File (or any other affected components), and connect its output to some storage
  such as Chroma DB.\n2. Create a symlink pointing to any file. For the above exploit,
  point the symlink to langflow's JWT token file.\n3. Compress this symlink with tar.\n
  4. Upload it to the Read File component.\n5. Check the database, or ask a Chatbot
  connected to this vector database for the contents of the file.\n\n\nConcrete PoC:\n
  ------------\n\n- Flow with RAG ingestion and a Chatbot around it: [Vector Store
  RAG.json](https://github.com/user-attachments/files/25159960/Vector.Store.RAG.json)\n
  - Exploit tar: [archive.tar.txt](https://github.com/user-attachments/files/25159954/archive.tar.txt)
  (remove .txt, GitHub blocked .tar)\n- Create a file `/tmp/trip.docx` with any contents
  in it\n- Ingest the file in the flow above, and ask the Chatbot a question about
  this file.\n\nA demo showing the attack:\nhttps://github.com/user-attachments/assets/af00f700-f13f-4eac-848e-8afd11fb9297\n
  In the demo the attacker steals `Langflow` secret key used to sign JWTs. The second
  stage of the attack, not shown in the demo, is using this key to sign a JWT token
  and executing Python code on the server using the Python code interpreter node.\n
  \n### Impact\nAny Langflow user using any of the above mentioned components to ingest
  user-controlled data is affected. Depending on exact scenario, the user can also
  be exposed to an RCE risk.\n\n\n### Patches\nFixed in **1.9.2** via PR [#12945](https://github.com/langflow-ai/langflow/pull/12945).
  `BaseFileComponent._unpack_bundle` now rejects symlink and hardlink members (and
  any non-regular entries) during TAR extraction, with additional defensive symlink
  filtering during directory recursion and after extraction. Upgrade to **1.9.2 or
  later**.\n\n\nOri Lahav\nSecurity Researcher @ Rubrik Inc."
