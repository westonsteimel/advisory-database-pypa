id: PYSEC-0000-apache-airflow-providers-apache-spark-GHSA-ffj9-4crc-q7wf
summary: Apache Airflow Spark Provider vulnerable to improper input validation
details: Apache Software Foundation Apache Airflow Spark Provider before 4.0.1 is
  vulnerable to improper input validation because the host and schema of JDBC Hook
  can contain `/` and `?` which is used to denote the end of the field.
