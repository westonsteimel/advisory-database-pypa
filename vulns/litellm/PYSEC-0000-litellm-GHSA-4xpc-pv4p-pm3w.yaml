summary: 'LiteLLM: Authentication Bypass via Host Header Injection'
details: "### Impact\n\nA Host-header parsing flaw in the LiteLLM proxy could, under
  specific conditions, allow unauthenticated access to protected management routes.\n
  \nThe auth layer derived the effective route from `request.url.path` in `litellm/proxy/auth/auth_utils.py::get_request_route()`,
  which Starlette reconstructs from the `Host` header. A crafted `Host` could therefore
  make the auth gate evaluate a different route from the one FastAPI dispatched.\n
  \n**Most deployments are not affected.** The bypass is blocked by any upstream layer
  that validates or normalizes `Host`, such as:\n\n- a CDN or WAF, such as Cloudflare\n
  - a reverse proxy with `server_name` allowlists\n- a host-based load balancer\n\n
  **LiteLLM Cloud customers are not affected.**\n\n### Patches\n\nFixed in **`1.84.0`**.
  Upgrade to `1.84.0` or later. No configuration change is required.\n\n### Workarounds\n
  \nIf upgrading is not immediately possible, place the proxy behind an upstream component
  that validates or normalizes the `Host` header before forwarding (a CDN/WAF, a reverse
  proxy with explicit `server_name` allowlists, or a cloud load balancer with host-based
  routing rules), or otherwise restrict network access to the proxy listener.\n\n
  ### References\n\n- Patched release: [`v1.84.0`](https://github.com/BerriAI/litellm/releases/tag/v1.84.0)\n
  \n**Discovery Credit**: Le The Thang (KCSC) and Kim Ngoc Chung (One Mount Group)"
