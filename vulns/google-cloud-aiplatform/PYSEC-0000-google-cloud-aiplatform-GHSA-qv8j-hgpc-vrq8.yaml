id: PYSEC-0000-google-cloud-aiplatform-GHSA-qv8j-hgpc-vrq8
summary: Google Cloud Vertex AI SDK affected by Stored Cross-Site Scripting (XSS)
details: Stored Cross-Site Scripting (XSS) in the _genai/_evals_visualization component
  of Google Cloud Vertex AI SDK (google-cloud-aiplatform) versions from 1.98.0 up
  to (but not including) 1.131.0 allows an unauthenticated remote attacker to execute
  arbitrary JavaScript in a victim's Jupyter or Colab environment via injecting script
  escape sequences into model evaluation results or dataset JSON data.
