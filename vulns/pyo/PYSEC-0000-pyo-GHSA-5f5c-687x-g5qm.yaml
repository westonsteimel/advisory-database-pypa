id: PYSEC-0000-pyo-GHSA-5f5c-687x-g5qm
summary: Classic Buffer Overflow in pyo
details: Buffer Overflow Vulnerability exists in ajaxsoundstudio.com in Pyo < 1.03
  in the Server_debug function, which allows remote attackers to conduct DoS attacks
  by deliberately passing on an overlong audio file name.
