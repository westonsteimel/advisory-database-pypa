summary: Horovod contains an insecure deserialization vulnerability in its KVStore
  HTTP server component
details: Horovod thru 0.28.1 contains an insecure deserialization vulnerability (CWE-502)
  in its KVStore HTTP server component. The KVStore server, used for distributed task
  coordination, lacks authentication and authorization controls, allowing any remote
  attacker to write arbitrary data via HTTP PUT requests. When a Horovod worker reads
  data from the KVStore (via HTTP GET), it deserializes the data using cloudpickle.loads()
  without verifying its source or integrity. An attacker can exploit this by sending
  a malicious pickle payload to the server before the legitimate data is written,
  causing the victim worker to deserialize and execute arbitrary code, leading to
  remote code execution.
