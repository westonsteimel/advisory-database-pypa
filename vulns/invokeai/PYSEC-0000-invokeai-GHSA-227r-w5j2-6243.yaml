summary: InvokeAI Arbitrary File Deletion vulnerability
details: In invoke-ai/invokeai version v5.0.2, the web API `POST /api/v1/images/delete`
  is vulnerable to Arbitrary File Deletion. This vulnerability allows unauthorized
  attackers to delete arbitrary files on the server, potentially including critical
  or sensitive system files such as SSH keys, SQLite databases, and configuration
  files. This can impact the integrity and availability of applications relying on
  these files.
