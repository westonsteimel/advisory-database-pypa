id: PYSEC-0000-sqladmin-GHSA-54mc-gghv-4cfj
summary: 'SQLAdmin: Authorization Bypass on `ajax_lookup`'
details: "### Impact\n\nThe `ajax_lookup` endpoint in `application.py` bypasses the\
  \ `is_accessible()` access control check that all other endpoints enforce.\n\nIf\
  \ a developer restricts model access by overriding `is_accessible()`, an authenticated\
  \ user can still query that model's data through the `ajax_lookup` endpoint \u2014\
  \ silently bypassing the restriction.\n\n**Affected endpoint:**\n\n`GET /{identity}/ajax/lookup?name=<field>&term=<query>`\n\
  \n**All other endpoints enforce both checks:**\n\n| Endpoint | `@login_required`\
  \ | `is_accessible()` |\n|---|---|---|\n| `list` | \u2713 | \u2713 |\n| `create`\
  \ | \u2713 | \u2713 |\n| `edit` | \u2713 | \u2713 |\n| `delete` | \u2713 | \u2713\
  \ |\n| `details` | \u2713 | \u2713 |\n| `export` | \u2713 | \u2713 |\n| `ajax_lookup`\
  \ (before fix) | \u2717 | \u2717 |\n| `ajax_lookup` (after fix) | \u2713 | \u2713\
  \ |\n\nNote: before this fix, `ajax_lookup` also lacked the `@login_required` decorator\
  \ \u2014 unauthenticated users could query it directly. That was addressed in #1035.\
  \ This report covers the remaining gap: authenticated but unauthorized users.\n\n\
  ### Patches\n\nTwo changes were made to `ajax_lookup`:\n\n1. Replaced the hand-rolled\
  \ authentication check added in #1035 with the standard `@login_required` decorator\
  \ used by all other endpoints.\n2. Added the missing `is_accessible(request)` check,\
  \ raising `HTTP 403` when it returns `False`.\n\n### Workarounds\n\nNone. Developers\
  \ relying on `is_accessible()` to restrict model visibility are exposed regardless\
  \ of what other access controls are in place."
