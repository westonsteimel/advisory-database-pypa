id: PYSEC-0000-intel-tensorflow-GHSA-m2f8-v8q4-3m59
summary: Authenticated Local Privilege Escalation vulnerability in Intel Optimization
  for Tensorflow
details: Improper buffer restrictions in the Intel(R) Optimization for Tensorflow
  software before version 2.12 may allow an authenticated user to potentially enable
  escalation of privilege via local access.
