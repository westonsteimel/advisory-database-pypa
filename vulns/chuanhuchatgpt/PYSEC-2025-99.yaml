details: A Denial of Service (DoS) vulnerability exists in the file upload feature
  of gaizhenbiao/chuanhuchatgpt version 20240914. The vulnerability is due to improper
  handling of form-data with a large filename in the file upload request. By sending
  a payload with an excessively large filename, the server becomes overwhelmed and
  unresponsive, leading to unavailability for legitimate users.
