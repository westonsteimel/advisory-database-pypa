summary: Codechecker has an authentication bypass for certain API calls
details: "### Summary\nAuthentication bypass occurs when the URL ends with Authentication
  with certain function calls. This bypass allows assigning arbitrary permissions
  to any existing user in CodeChecker.\n\n### Details\n\nThe following functions are
  affected under the Authentication endpoint: `getAuthorisedNames`, `getPermissionsForUser`,
  `hasPermission`, `addPermission`, and `removePermission`.\n\nThe vulnerability allows
  unauthenticated users to execute these function calls with arbitrary arguments.\n
  In the logs, the exploit shows as follows:\n```\n[INFO 2026-04-23 21:23] - 127.0.0.1:42654
  -- [Anonymous] POST /v6.67/Authentication@getAuthorisedNames\n[INFO 2026-04-23 21:23]
  - 127.0.0.1:42654 -- [Anonymous] POST /v6.67/Authentication@addPermission\n```\n
  \n### Impact\nAn attacker with a CodeChecker user can effectively acquire superuser
  permissions by calling these endpoints.\n\n### Patch\nA patch is available at https://github.com/Ericsson/codechecker/releases/tag/v6.27.4."
