id: PYSEC-0000-cvrf2csaf-GHSA-m8gq-83gh-v42v
summary: XML External Entities Vulnerability in CVRF-CSAF-Converter
details: CVRF-CSAF-Converter before 1.0.0-rc2 resolves XML External Entities (XXE).
  This leads to the inclusion of arbitrary (local) file content into the generated
  output document. An attacker can exploit this to disclose information from the system
  running the converter.
