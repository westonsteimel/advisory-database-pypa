id: PYSEC-0000-fschat-GHSA-77cj-rv5x-v6r2
summary: FastChat open redirect vulnerability
details: An open redirect vulnerability in lm-sys/fastchat Release v0.2.36 allows
  a remote unauthenticated attacker to redirect users to arbitrary websites via a
  specially crafted URL. This can be exploited for phishing attacks, malware distribution,
  and credential theft.
