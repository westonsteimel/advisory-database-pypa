summary: pgAdmin 4 Vulnerable to Remote Code Execution
details: "Remote Code Execution security vulnerability in pgAdmin 4  (Query Tool and
  Cloud Deployment modules).\n\nThe vulnerability is associated with the 2 POST endpoints; /sqleditor/query_tool/download,
  where the query_commited parameter and /cloud/deploy endpoint, where the high_availability
  parameter is unsafely passed to the Python eval() function, allowing arbitrary code
  execution.\n\n\nThis issue affects pgAdmin 4: before 9.2."
