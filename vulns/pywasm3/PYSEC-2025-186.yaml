details: A vulnerability has been found in wasm3 0.5.0 and classified as problematic.
  This vulnerability affects the function MarkSlotAllocated of the file source/m3_compile.c.
  The manipulation leads to out-of-bounds write. An attack has to be approached locally.
  The exploit has been disclosed to the public and may be used.
