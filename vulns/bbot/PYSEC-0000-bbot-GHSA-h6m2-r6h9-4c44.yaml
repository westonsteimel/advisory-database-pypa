summary: BBOT's insufficient sanitization issues in gitdumper.py can lead to RCE
details: "### Summary\n\nbbot's `gitdumper.py` insufficiently sanitises a `.git/config`
  file, leading to Remote Code Execution (RCE).\n\nbbot's `gitdumper.py` can be made
  to consume a malicious `.git/index` file, leading to arbitrary file write which
  can be used to achieve Remote Code Execution (RCE).\n\n### Impact\n\nA user who
  uses bbot to scan a malicious webserver may have arbitrary code executed on their
  system."
