id: PYSEC-0000-calibreweb-GHSA-pc5g-j9j7-p4q3
summary: Calibre-Web Has a Stored Cross-Site Scripting (XSS) Vulnerability via the
  'username' Field During User Creation
details: A Stored Cross-Site Scripting (XSS) vulnerability in Calibre-Web v0.6.25
  allows attackers to inject malicious JavaScript into the 'username' field during
  user creation. The payload is stored unsanitized and later executed when the /ajax/listusers
  endpoint is accessed.
