id: PYSEC-0000-opencv-python-GHSA-fw99-f933-rgh8
summary: Out-of-bounds Read and Out-of-bounds Write in OpenCV
details: An issue was discovered in OpenCV before 3.4.7 and 4.x before 4.1.1 (OpenCV-Python
  before 3.4.7.28 and 4.x before 4.1.1.26). There is an out of bounds read/write in
  the function HaarEvaluator::OptFeature::calc in modules/objdetect/src/cascadedetect.hpp,
  which leads to denial of service.
