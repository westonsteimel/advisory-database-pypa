id: PYSEC-0000-opencv-python-GHSA-9g8h-pjm4-q92p
summary: Out-of-bounds Write in OpenCV.
details: In OpenCV 3.3.1 (corresponding with OpenCV-Python 3.3.1.11), a heap-based
  buffer overflow happens in cv::Jpeg2KDecoder::readComponent8u in modules/imgcodecs/src/grfmt_jpeg2000.cpp
  when parsing a crafted image file.
