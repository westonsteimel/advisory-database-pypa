summary: internetarchive Vulnerable to Directory Traversal in File.download()
details: "### Impact\n**What kind of vulnerability is it?**\nThis is a **Critical**
  severity directory traversal (path traversal) vulnerability in the `File.download()`
  method of the `internetarchive` library.\n\n**Who is impacted?**\nAll users of the
  `internetarchive` library versions `< 5.5.1` are impacted. The vulnerability is
  particularly critical for users on **Windows systems**, but all operating systems
  are affected.\n\n**Description of the vulnerability:**\nThe vulnerability existed
  because the `file.download()` method did not properly sanitize user-supplied filenames
  or validate the final download path. A maliciously crafted filename could contain
  path traversal sequences (e.g., `../../../../windows/system32/file.txt`) or illegal
  characters that, when processed, would cause the file to be written outside of the
  intended target directory.\n\n**Potential Impact:**\nAn attacker could potentially
  overwrite critical system files or application configuration files, leading to a
  denial of service, privilege escalation, or remote code execution, depending on
  the context in which the library is used.\n\n### Patches\n**Has the problem been
  patched?**\nYes, the problem has been patched.\n\n**What versions should users upgrade
  to?**\nUsers must upgrade to version **5.5.1** or later.\n\n### Workarounds\nIs
  there a way for users to fix or remediate the vulnerability without upgrading?\n
  There is no direct workaround that does not involve upgrading the library. The vulnerability
  is in the core logic of the file download process.\n\nThe only alternative for users
  who absolutely cannot upgrade is to implement their own custom download function
  that:\n\n1. Manually sanitizes all filenames using a robust method.\n2. Validates
  that the resolved absolute path of the download target is within the intended directory
  before writing any files.\n\nHowever, this essentially re-implements the fix and
  is not recommended. Upgrading to the patched version is the only safe and supported
  solution.\n\n### References\n\n- [Release Notes for v5.5.1](https://github.com/jjjake/internetarchive/releases/tag/v5.5.1)\n
  - [Commit with the fix](https://github.com/jjjake/internetarchive/commit/cba2d459e10a9489fb35caeba0b03e80f5f5d7c2)\n
  - **CVE Identifier:**  CVE-2025-58438"
