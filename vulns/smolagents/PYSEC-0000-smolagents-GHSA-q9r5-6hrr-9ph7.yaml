summary: 'Hugging Face smolagents: Unsafe deserialization in Remote Python Executor
  leads to RCE'
details: "Hugging Face smolagents Remote Python Executor Deserialization of Untrusted
  Data Remote Code Execution Vulnerability. This vulnerability allows remote attackers
  to execute arbitrary code on affected installations of Hugging Face smolagents.
  Authentication is not required to exploit this vulnerability.\n\nThe specific flaw
  exists within the parsing of pickle data. The issue results from the lack of proper
  validation of user-supplied data, which can result in deserialization of untrusted
  data. An attacker can leverage this vulnerability to execute code in the context
  of the service account. Was ZDI-CAN-28312."
