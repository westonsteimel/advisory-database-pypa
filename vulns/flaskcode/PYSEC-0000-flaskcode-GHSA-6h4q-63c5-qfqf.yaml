id: PYSEC-0000-flaskcode-GHSA-6h4q-63c5-qfqf
summary: Path traversal in flaskcode
details: An issue was discovered in the flaskcode package through 0.0.8 for Python.
  An unauthenticated directory traversal, exploitable with a GET request to a /resource-data/<file_path>.txt
  URI (from views.py), allows attackers to read arbitrary files.
