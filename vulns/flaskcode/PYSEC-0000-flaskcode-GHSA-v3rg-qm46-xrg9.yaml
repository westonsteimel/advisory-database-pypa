id: PYSEC-0000-flaskcode-GHSA-v3rg-qm46-xrg9
summary: Path traversal in flaskcode
details: An issue was discovered in the flaskcode package through 0.0.8 for Python.
  An unauthenticated directory traversal, exploitable with a POST request to a /update-resource-data/<file_path>
  URI (from views.py), allows attackers to write to arbitrary files.
