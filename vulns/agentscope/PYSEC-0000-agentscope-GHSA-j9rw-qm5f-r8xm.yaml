details: A path traversal vulnerability exists in the save-workflow and load-workflow
  functionality of modelscope/agentscope versions prior to the fix. This vulnerability
  allows an attacker to read and write arbitrary JSON files on the filesystem, potentially
  leading to the exposure or modification of sensitive information such as configuration
  files, API keys, and hardcoded passwords.
