details: "### Description\n\nIn the FlightServer class\_of the pyquokka framework,\
  \ the\_do_action()\_method\_directly uses\_pickle.loads()\_to deserialize action\_\
  bodies received\_from Flight clients without any sanitization or validation, which\
  \ results in a remote code execution vulnerability. The vulnerable code is located\
  \ in\_pyquokka/flight.py\_at\_line 283, where arbitrary data from Flight clients\_\
  is directly passed\_to\_pickle.loads().\n \nEven\_more concerning, when FlightServer\
  \ is configured to listen on\_0.0.0.0\_(as shown\_in the provided server example\
  \ at line\_339), this allows attackers across the entire network to perform arbitrary\
  \ remote code execution\_by sending malicious pickled payloads through the\_set_configs\_\
  action.\n\nIn addition, the functions cache_garbage_collect, do_put, and do_get\
  \ also contain vulnerability points where pickle.loads is used to deserialize untrusted\
  \ remote data. Please review and fix these issues accordingly. This report uses\
  \ the set_configs action as an example.\n\n\n### Proof of Concept\n \n* Step 1:\n\
  The victim user\_starts a FlightServer that binds to the network interface, e.g.:\n\
  ```\nserver\_=\_FlightServer(\"0.0.0.0\",\_location\_=\_\"grpc+tcp://0.0.0.0:5005\"\
  )\nserver.serve()\n````\n* Step 2:\nThe attacker can then send malicious pickle\
  \ dump data through\_the Flight client connection. The provided PoC demonstrates\
  \ how an attacker can execute \"ls -l\" command:\n\n```python\nclass RCE:\ndef __reduce__(self):\n\
  \ import os\nreturn (os.system, ('ls -l',))\n\nimport pickle\naction_body = pickle.dumps(RCE())\n\
  \ action = pyarrow.flight.Action(\"set_configs\", action_body)\n```\n\nWhen the\_\
  server receives this payload, the\_FlightServer.do_action()\_method calls\_pickle.loads(action.body.to_pybytes())\_\
  on line 283,\_which triggers the execution\_of the malicious code through Python's\
  \ pickle deserialization mechanism. The provided\_flight_client.py\_demonstrates\
  \ a complete\_PoC that connects to the vulnerable server and executes arbitrary\
  \ commands through\_the pickle deserialization vulnerability.\n\nWhen the vulnerability\
  \ is reproduced, python flight.py can be run to init the server and then run flight_client.py.\
  \ There is an attack demo in the attachment.\n\n### Impact\n\nRemote code execution\
  \ on the\_victim's machine over the network. Once the victim starts\_the FlightServer\
  \ with network binding (especially\_0.0.0.0), an attacker on\_the network\_can gain\
  \ arbitrary code execution by connecting to the Flight endpoint\_and sending crafted\
  \ pickle payloads through the\_set_configs\_action. This vulnerability allows\_\
  for:\n\n- Complete system compromise\n - Data exfiltration\n- Lateral movement within\
  \ the network\n- Denial of service attacks\n- Installation of persistent backdoors\n\
  \n### Mitigation\n\n1. **Replace unsafe deserialization**: Replace `pickle.loads()`\
  \ with safer alternatives such as:\n   - JSON serialization for simple data structures\n\
  \   - Protocol Buffers or MessagePack for complex data\n   - If pickle must be used,\
  \ implement a custom `Unpickler` with a restricted `find_class()` method that only\
  \ allows whitelisted classes\n\n 2. **Network security**: \n   - If the service\
  \ is intended for internal use only, bind to localhost (`127.0.0.1`) instead of\
  \ `0.0.0.0`\n   - Implement authentication and authorization mechanisms\n\n3. **Security\
  \ warnings**: When starting the service on public interfaces, display clear security\
  \ warnings to inform users about the risks."
