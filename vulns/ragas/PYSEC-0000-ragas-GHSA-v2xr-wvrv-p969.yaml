id: PYSEC-0000-ragas-GHSA-v2xr-wvrv-p969
summary: RAGAS has an Arbitrary File Read vulnerability
details: An Arbitrary File Read vulnerability exists in the ImageTextPromptValue class
  in Exploding Gradients RAGAS v0.2.3 to v0.2.14. The vulnerability stems from improper
  validation and sanitization of URLs supplied in the retrieved_contexts parameter
  when handling multimodal inputs.
