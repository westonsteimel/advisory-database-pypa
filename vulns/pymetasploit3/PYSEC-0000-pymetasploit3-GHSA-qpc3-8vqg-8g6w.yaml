details: Command injection vulnerability in console.run_module_with_output() in pymetasploit3
  through version 1.0.6 allows attackers to inject newline characters into module
  options such as RHOSTS. This breaks the intended command structure and causes the
  Metasploit console to execute additional unintended commands, potentially leading
  to arbitrary command execution and manipulation of Metasploit sessions.
