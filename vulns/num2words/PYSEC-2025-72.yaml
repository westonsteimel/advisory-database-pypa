id: PYSEC-2025-72
modified: 2025-07-31T14:34:47Z
summary: After a successful phishing attack, new versions of `num2words` were published
  containing malware.
details: |
  The `num2words` project was compromised via a phishing attack
  and two new versions were uploaded to PyPI containing malicious code.
  The affected versions have been removed from PyPI,
  and users are advised to remove the affected versions from their environments.
affected:
- package:
    ecosystem: PyPI
    name: num2words
    purl: pkg:pypi/num2words
  versions:
  - 0.5.15
  - 0.5.16
