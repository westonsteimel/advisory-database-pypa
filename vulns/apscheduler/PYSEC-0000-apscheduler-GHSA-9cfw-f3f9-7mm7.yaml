summary: APScheduler's JSONSerializer and CBORSerializer are vulnerable to Remote
  Code Execution (RCE) via Insecure Deserialization
details: The JSONSerializer and CBORSerializer in APScheduler (all versions including
  3.10.x and 4.0.0a5) are vulnerable to Remote Code Execution (RCE) via Insecure Deserialization.
  The unmarshal_object function allows for arbitrary class instantiation and state
  injection by dynamically importing modules and calling __setstate__ on any class
  available in the Python environment. An attacker can exploit this by submitting
  a specially crafted JSON or CBOR payload to an application using these serializers
