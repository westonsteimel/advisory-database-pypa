summary: Semantic Kernel has Arbitrary File Write via AI Agent Function Calling in
  .NET SDK
details: "### Impact\n_What kind of vulnerability is it? Who is impacted?_\nAn Arbitrary
  File Write vulnerability has been identified in Microsoft's Semantic Kernel .NET
  SDK, specifically within the `SessionsPythonPlugin`.\nDevelopers who have built
  applications which include Microsoft's Semantic Kernel .NET SDK and are using the
  `SessionsPythonPlugin`\n\n### Patches\n_Has the problem been patched? What versions
  should users upgrade to?_\nThe problem has been fixed in [Microsoft.SemanticKernel.Plugins.Core
  version 1.71.0](https://www.nuget.org/packages/Microsoft.SemanticKernel.Plugins.Core/1.71.0).
  Users should upgrade to version 1.71.0 or higher.\n\n### Workarounds\n_Is there
  a way for users to fix or remediate the vulnerability without upgrading?_\nUsers
  can create a [Function Invocation Filter](https://learn.microsoft.com/en-us/semantic-kernel/concepts/enterprise-readiness/filters?pivots=programming-language-csharp#function-invocation-filter)
  which checks the arguments being passed to any calls to `DownloadFileAsync ` or
  `UploadFileAsync` and ensures the provided `localFilePath` is allow listed.\n\n
  ### References\n_Are there any links users can visit to find out more?_\n- [Sample
  showing safe use of the CodeInterpreterPlugin](https://github.com/microsoft/semantic-kernel/blob/main/dotnet/samples/Demos/CodeInterpreterPlugin/Program.cs#L61-L64)\n
  - [PR to Add file upload security controls to SessionsPythonPlugin](https://github.com/microsoft/semantic-kernel/pull/13478/changes#diff-88d3cacba2bfa84eef8f2aa171b34f9940338cbb784a3ffc49f5fe3af1b8943d)"
