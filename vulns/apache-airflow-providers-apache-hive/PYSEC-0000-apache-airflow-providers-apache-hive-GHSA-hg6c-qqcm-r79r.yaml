summary: Apache Airflow Hive Provider Beeline remote code execution with Principal
details: "Improper Input Validation vulnerability in Apache Software Foundation Apache
  Airflow Hive Provider.\nThis issue affects Apache Airflow Apache Hive Provider:
  before 6.1.1.\n\nBefore version 6.1.1 it was possible to bypass the security check
  to RCE via\nprincipal parameter. For this to be exploited it requires access to
  modifying the connection details.\n\nIt is recommended updating provider version
  to 6.1.1 in order to avoid this vulnerability."
