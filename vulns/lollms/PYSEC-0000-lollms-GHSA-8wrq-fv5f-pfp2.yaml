summary: parisneo/lollms vulnerable to stored XSS in the social feature
details: A Stored Cross-Site Scripting (XSS) vulnerability was identified in the social
  feature of parisneo/lollms, affecting the latest version prior to 2.2.0. The vulnerability
  exists in the `create_post` function within `backend/routers/social/__init__.py`,
  where user-provided content is directly assigned to the `DBPost` model without sanitization.
  This allows attackers to inject and store malicious JavaScript, which is executed
  in the browsers of users viewing the Home Feed, including administrators. This can
  lead to account takeover, session hijacking, and wormable attacks. The issue is
  resolved in version 2.2.0.
