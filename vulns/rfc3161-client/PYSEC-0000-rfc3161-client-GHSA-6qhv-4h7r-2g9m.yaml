summary: rfc3161-client has insufficient verification for timestamp response signatures
details: "### Impact\n\n`rfc3161-client` 1.0.2 and earlier contain a flaw in their
  timestamp response signature verification logic. In particular, it performs chain
  verification against the TSR's embedded certificates up to the trusted root(s),
  but fails to verify the TSR's own signature against the timestamping leaf certificates.
  Consequently, vulnerable versions perform insufficient signature validation to properly
  consider a TSR verified, as the attacker can introduce _any_ TSR signature so long
  as the embedded leaf chains up to some root TSA.\n\n### Patches\n\nUsers should
  immediately upgrade to `rfc3161-client` 1.0.3 or later.\n\n### Workarounds\n\nThere
  is no workaround possible. Users should immediately upgrade to a fixed version."
