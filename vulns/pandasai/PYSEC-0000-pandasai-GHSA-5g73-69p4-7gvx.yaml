summary: Code execution in pandasai
details: 'GenerateSDFPipeline in synthetic_dataframe in PandasAI (aka pandas-ai) through
  1.5.17 allows attackers to trigger the generation of arbitrary Python code that
  is executed by SDFCodeExecutor. An attacker can create a dataframe that provides
  an English language specification of this Python code. NOTE: the vendor previously
  attempted to restrict code execution in response to a separate issue, CVE-2023-39660.'
