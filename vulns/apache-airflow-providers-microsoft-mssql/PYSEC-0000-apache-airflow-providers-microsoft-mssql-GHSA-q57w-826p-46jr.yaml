id: PYSEC-0000-apache-airflow-providers-microsoft-mssql-GHSA-q57w-826p-46jr
summary: Apache Airflow ODBC Provider, Apache Airflow MSSQL Provider Improper Input
  Validation vulnerability
details: "Input Validation vulnerability in Apache Software Foundation Apache Airflow\
  \ ODBC Provider, Apache Software Foundation Apache Airflow MSSQL Provider.This\_\
  vulnerability is considered low since it requires DAG code to use `get_sqlalchemy_connection`\
  \ and someone with access to connection resources specifically\_updating the connection\
  \ to exploit it.\n\nThis issue affects Apache Airflow ODBC Provider: before 4.0.0;\
  \ Apache Airflow MSSQL Provider: before 3.4.1.\n\nIt is recommended to\_upgrade\
  \ to a version that is not affected\n\n"
