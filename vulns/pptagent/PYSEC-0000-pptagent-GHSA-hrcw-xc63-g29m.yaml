id: PYSEC-0000-pptagent-GHSA-hrcw-xc63-g29m
summary: 'PPTAgent: Arbitrary File Write + Directory Creation via markdown_table_to_image'
details: "### Summary\n\nThe `markdown_table_to_image` tool accepts a caller-controlled\
  \ path parameter and passes it directly to `get_html_table_image`:\n\n```python\n\
  # pptagent/mcp_server.py:127-143\ndef markdown_table_to_image(markdown_table: str,\
  \ path: str, css: str) -> str:\n    \"\"\"\n    Args:\n        path (str): The file\
  \ path where the image will be saved\n    \"\"\"\n    html = markdown_to_html(markdown_table)\n\
  \    get_html_table_image(html, path, css)           # \u2190 no path validation\n\
  \    return f\"Markdown table converted to image and saved to {path}\"\n\n# pptagent/utils.py:337-366\n\
  def get_html_table_image(html: str, output_path: str, css: str = None):\n    parent_dir,\
  \ base_name = os.path.split(output_path)\n    if parent_dir and not os.path.exists(parent_dir):\n\
  \        os.makedirs(parent_dir)                     # \u2190 creates arbitrary\
  \ directories\n    hti = Html2Image(...)\n    hti.screenshot(\n        html_str=html,\n\
  \        css_str=css,\n        save_as=base_name,                          # \u2190\
  \ writes image to any directory\n        size=(1000, 600),\n    )\n```\n\n`os.makedirs(parent_dir)`\
  \ creates arbitrary directory trees, and `Html2Image.screenshot` writes the rendered\
  \ image to `parent_dir/base_name`. Unlike `download_file` in the same project, there\
  \ is no `is_relative_to(workspace)` guard. This behaviour can be fixed with the\
  \ same pattern as the above.\n\n\n### Impact\n\nThe concrete attack scenarios include\n\
  \n- SSH key replacement: `path = \"/home/user/.ssh/authorized_keys\"` \u2014 replaces\
  \ the authorized_keys file with an image binary (breaks - SSH but could be an image\
  \ crafted with a specific PNG/JPEG payload).\n- Web shell: `path = \"/var/www/html/uploads/shell.php\"\
  ` \u2014 writes the rendered PNG there; the file has the .php extension but PNG\
  \ content; combined with Apache Options +MultiViews or file-include vulnerabilities\
  \ could be dangerous.\n- Directory creation oracle: `path = \"/root/test/probe.png\"\
  ` \u2014 if the directory is created, confirms the target path exists; if it errors,\
  \ reveals permissions information."
