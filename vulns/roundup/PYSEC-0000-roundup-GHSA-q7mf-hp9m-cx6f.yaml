id: PYSEC-0000-roundup-GHSA-q7mf-hp9m-cx6f
summary: Roundup Directory traversal vulnerability
details: Directory traversal vulnerability in Roundup 0.6.4 and earlier allows remote
  attackers to view arbitrary files via `..` (dot dot) sequences in an `@@` command
  in an HTTP GET request.
