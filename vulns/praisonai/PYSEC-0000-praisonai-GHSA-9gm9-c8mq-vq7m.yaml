summary: 'PraisonAI: OS Command Injection in MCPHandler.parse_mcp_command()'
details: "### Summary\n\nThe `--mcp` CLI argument is passed directly to `shlex.split()`
  and forwarded through the call chain to `anyio.open_process()` with no validation,
  allowlist check, or sanitization at any hop, allowing arbitrary OS command execution
  as the process user.\n\n### Details\n\n`cli/features/mcp.py:61` (source) -> `praisonaiagents/mcp/mcp.py:345`
  (hop) -> `mcp/client/stdio/__init__.py:253` (sink)\n```python\n# source\nparts =
  shlex.split(command)\n\n# hop\ncmd, args, env = self.parse_mcp_command(command,
  env_vars)\nself.server_params = StdioServerParameters(command=cmd, args=arguments)\n
  \n# sink\nprocess = await anyio.open_process([command, *args])\n\n```\n\nFixed in
  commit `47bff65413beaa3c21bf633c1fae4e684348368c` (v4.5.69) by introducing a command
  allowlist:\n```python\nALLOWED_COMMANDS = {\"npx\", \"uvx\", \"node\", \"python\"\
  }\nif cmd not in ALLOWED_COMMANDS:\n    raise ValueError(f\"Disallowed command:
  {cmd}\")\n```\n\n### PoC\n```python\n# tested on: praisonai==4.5.48\n# install:
  pip install praisonai==4.5.48\n# run: praisonai --mcp \"bash -c 'id > /tmp/pwned'\"\
  \n# verify: cat /tmp/pwned\n# expected output: uid=1000(...) gid=1000(...) groups=1000(...)\n
  ```\n\n### Impact\n\nAny deployment where the `--mcp` argument is influenced by
  untrusted input is exposed to full OS command execution as the process user. No
  authentication is required."
