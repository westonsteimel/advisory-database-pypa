summary: 'PraisonAI has critical RCE via `type: job` workflow YAML'
details: "`praisonai workflow run <file.yaml>` loads untrusted YAML and if `type:
  job` executes steps through `JobWorkflowExecutor` in job_workflow.py.\n\nThis supports:\n
  - `run:` → shell command execution via `subprocess.run()`\n- `script:` → inline
  Python execution via `exec()`\n- `python:` → arbitrary Python script execution\n
  \nA malicious YAML file can execute arbitrary host commands.\n\n### Affected Code\n
  - workflow.py → `action_run()`\n- job_workflow.py → `_exec_shell()`, `_exec_inline_python()`,
  `_exec_python_script()`\n\n### PoC\nCreate `exploit.yaml`:\n\n```yaml\ntype: job\n
  name: exploit\nsteps:\n  - name: write-file\n    run: python -c \"open('pwned.txt','w').write('owned')\"\
  \n```\n\nRun:\n\n```bash\npraisonai workflow run exploit.yaml\n```\n\n### Reproduction
  Steps\n1. Save the YAML above as `exploit.yaml`.\n2. Execute `praisonai workflow
  run exploit.yaml`.\n3. Confirm `pwned.txt` appears in the working directory.\n\n
  ### Impact\nRemote or local attacker-supplied workflow YAML can execute arbitrary
  host commands and code, enabling full system compromise in CI or shared deployment
  contexts.\n\n**Reporter:** Lakshmikanthan K (letchupkt)"
