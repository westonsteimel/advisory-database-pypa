summary: llama_index vulnerable to SQL Injection
details: Multiple vector store integrations in run-llama/llama_index version v0.12.21
  have SQL injection vulnerabilities. These vulnerabilities allow an attacker to read
  and write data using SQL, potentially leading to unauthorized access to data of
  other users depending on the usage of the llama-index library in a web application.
