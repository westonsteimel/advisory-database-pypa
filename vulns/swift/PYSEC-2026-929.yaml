summary: OpenStack Object Storage (Swift) allows remote attackers to cause a denial of service
details: OpenStack Object Storage (Swift) before 2.4.0 does not properly close client connections, which allows remote attackers to cause a denial of service (proxy-server resource consumption) via a series of interrupted requests to a Large Object URL.
