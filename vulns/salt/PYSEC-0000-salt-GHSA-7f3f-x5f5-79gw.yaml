id: PYSEC-0000-salt-GHSA-7f3f-x5f5-79gw
summary: Salt's file contents overwrite the VirtKey class
details: "File contents overwrite the VirtKey class is called when \u201Con-demand\
  \ pillar\u201D data is requested and uses un-validated input to create paths to\
  \ the \u201Cpki directory\u201D. The functionality is used to auto-accept Minion\
  \ authentication keys based on a pre-placed \u201Cauthorization file\u201D at a\
  \ specific location and is present in the default configuration."
