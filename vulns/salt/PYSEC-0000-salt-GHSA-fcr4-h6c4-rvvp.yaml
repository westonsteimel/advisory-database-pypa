id: PYSEC-0000-salt-GHSA-fcr4-h6c4-rvvp
summary: 'Salt''s on demand pillar functionality vulnerable to arbitrary command injections '
details: An attacker with access to a minion key can exploit the 'on demand' pillar
  functionality with a specially crafted git url which could cause and arbitrary command
  to be run on the master with the same privileges as the master process.
