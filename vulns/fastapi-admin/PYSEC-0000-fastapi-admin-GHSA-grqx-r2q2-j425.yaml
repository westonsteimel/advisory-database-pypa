id: PYSEC-0000-fastapi-admin-GHSA-grqx-r2q2-j425
summary: FastAPI Admin Cross-site Scripting vulnerability in the Config-Create function
details: A cross-site scripting (XSS) vulnerability in the Config-Create function
  of fastapi-admin pro v0.1.4 allows attackers to execute arbitrary web scripts or
  HTML via a crafted payload injected into the Product Name parameter.
