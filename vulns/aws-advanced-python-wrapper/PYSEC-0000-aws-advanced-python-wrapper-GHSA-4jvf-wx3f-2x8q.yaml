id: PYSEC-0000-aws-advanced-python-wrapper-GHSA-4jvf-wx3f-2x8q
summary: 'AWS Advanced Python Wrapper: Privilege Escalation in Aurora PostgreSQL instance '
details: "### Description of Vulnerability:\n\nAn issue in AWS Wrappers for Amazon\
  \ Aurora PostgreSQL may allow for privilege escalation to rds_superuser role. A\
  \ low privilege authenticated user can create a crafted function that could be executed\
  \ with permissions of other Amazon Relational Database Service (RDS) users.\n\n\
  AWS recommends customers upgrade to the following versions:  AWS Python Wrapper\
  \ to v1.4.0\n\n\n### Source of Vulnerability Report: \nAllistair Ishmael Hakim <allistair.hakim@gmail.com>\n\
  \n\n### Affected products & versions: \nAWS Python Wrapper < 1.4.0\n\n\n### Platforms:\
  \ \nMacOS/Windows/Linux"
