summary: Apache Airflow Exposes Secrets in Variables Saved as JSON Dictionaries
details: "Secrets in Variables saved as JSON dictionaries were not properly redacted - in case the variables were retrieved by the user the secrets stored as nested fields were not masked.\n\nIf developers do not store variables with sensitive values in JSON form, their projects are not affected. Otherwise upgrade to the fixed version, Apache Airflow 3.2.0."
