id: PYSEC-0000-apache-superset-GHSA-9f88-wg5r-947j
summary: Apache Superset vulnerable to Cross-site Scripting
details: Dashboard rendering does not sufficiently sanitize the content of markdown
  components leading to possible XSS attack vectors that can be performed by authenticated
  users with create dashboard permissions. This issue affects Apache Superset version
  1.5.2 and prior versions and version 2.0.0.
