id: PYSEC-0000-apache-superset-GHSA-jfxj-xf67-x723
summary: Apache Superset SQL injection vulnerability
details: "A where_in JINJA macro allows users to specify a quote, which combined with\
  \ a carefully crafted statement\_would allow for SQL injection\_in Apache Superset.This\
  \ issue affects Apache Superset: before 2.1.3, from 3.0.0 before 3.0.2.\n\nUsers\
  \ are recommended to upgrade to version 2.1.3 or 3.0.2, which fixes the issue."
