details: "A stored cross-site scripting (XSS) vulnerability exists in Apache Superset\
  \ before 3.0.3.\_An authenticated attacker with create/update permissions on charts\
  \ or dashboards could store a script or add a specific HTML snippet that would act\
  \ as a stored XSS.\n\nFor 2.X versions, users should change their config to include:\n\
  \ \nTALISMAN_CONFIG = {\n\_ \_ \"content_security_policy\": {\n\_ \_ \_ \_ \"base-uri\"\
  \ : [\"'self'\"],\n\_ \_ \_ \_ \"default-src\": [\"'self'\"],\n\_ \_ \_ \_ \"img-src\"\
  : [\"'self'\", \"blob:\", \"data:\"],\n\_ \_ \_ \_ \"worker-src\": [\"'self'\",\
  \ \"blob:\"],\n\_ \_ \_ \_ \"connect-src\": [\n\_ \_ \_ \_ \_ \_ \"'self'\",\n\_\
  \ \_ \_ \_ \_ \_ \" https://api.mapbox.com\" https://api.mapbox.com\" ;,\n\_ \_\
  \ \_ \_ \_ \_ \" https://events.mapbox.com\" https://events.mapbox.com\" ;,\n\_\
  \ \_ \_ \_ ],\n\_ \_ \_ \_ \"object-src\": \"'none'\",\n\_ \_ \_ \_ \"style-src\"\
  : [\n \_ \_ \_ \_ \_ \_ \"'self'\",\n\_ \_ \_ \_ \_ \_ \"'unsafe-inline'\",\n\_\
  \ \_ \_ \_ ],\n\_ \_ \_ \_ \"script-src\": [\"'self'\", \"'strict-dynamic'\"],\n\
  \_ \_ },\n\_ \_ \"content_security_policy_nonce_in\": [\"script-src\"],\n\_ \_ \"\
  force_https\": False,\n\_ \_ \"session_cookie_secure\" : False,\n}"
