id: PYSEC-0000-apache-superset-GHSA-7222-r37x-8q3m
summary: Apache Superset vulnerable to Cross-Site Request Forgery via legacy REST
  API endpoints
details: Two legacy REST API endpoints for approval and request access are vulnerable
  to cross site request forgery. This issue affects Apache Superset version 1.5.2
  and prior versions and version 2.0.0.
