id: PYSEC-0000-apache-superset-GHSA-fxjg-28fm-pfxh
summary: Apache Superset Server-Side Request Forgery vulnerability
details: "A malicious actor who has been authenticated and granted specific permissions\
  \ in Apache Superset may use the import dataset feature in order to conduct Server-Side\
  \ Request Forgery attacks and query internal resources on behalf of the server where\
  \ Superset is deployed. This vulnerability exists\_in Apache Superset versions up\
  \ to and including 2.0.1."
