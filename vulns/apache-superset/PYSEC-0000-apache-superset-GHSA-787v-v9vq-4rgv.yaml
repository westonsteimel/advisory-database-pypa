id: PYSEC-0000-apache-superset-GHSA-787v-v9vq-4rgv
summary: 'Apache Superset: SQLLab Improper readonly query validation allows unauthorized
  write access'
details: "Improper Authorization vulnerability in Apache Superset. On Postgres analytic\
  \ databases an attacker with SQLLab access can\_craft a specially designed SQL DML\
  \ statement\_that is Incorrectly identified as a read-only query, enabling its execution.\
  \ Non postgres analytics database connections and postgres analytics database connections\
  \ set with a readonly user (advised) are not vulnerable.\_\n\nThis issue affects\
  \ Apache Superset: before 4.1.0.\n\nUsers are recommended to upgrade to version\
  \ 4.1.0, which fixes the issue."
