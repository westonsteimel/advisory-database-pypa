id: PYSEC-0000-apache-superset-GHSA-wq8q-99p5-xfrw
summary: Apache Superset Cross-site Scripting vulnerability
details: "Improper payload validation and an improper REST API response type, made\
  \ it possible for an authenticated malicious actor to store malicious code into\
  \ Chart's metadata, this code could get executed if a user specifically accesses\
  \ a specific deprecated API endpoint.\_This issue affects Apache Superset versions\
  \ prior to 2.1.2.\_\nUsers are recommended to upgrade to version 2.1.2, which fixes\
  \ this issue."
