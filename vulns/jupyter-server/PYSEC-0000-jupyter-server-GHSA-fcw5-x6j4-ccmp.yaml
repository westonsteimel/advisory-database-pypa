summary: 'Jupyter Server: Stored XSS in `NbconvertFileHandler` / `NbconvertPostHandler`
  via missing `sandbox` CSP '
details: "The nbconvert HTTP handlers in jupyter_server render user-authored notebook
  HTML under the Jupyter origin without a sandbox directive in their `Content-Security-Policy`.
  \n\nCombined with `nbconvert.HTMLExporter`'s default non-sanitizing behavior, a
  notebook carrying an HTML payload in a display_data output triggers stored XSS with
  cookie access, full /api/* authority, and kernel RCE.\n\n### Impact\n\nAn authenticated
  victim who navigates to `/nbconvert/html/<path>` containing attacker-authored output
  can have their token exfiltrated to another domain because it is executed in the
  Jupyter origin.\n\n### Patches\n\nFixed in v2.20.0, commit [6cbee8d](https://github.com/jupyter-server/jupyter_server/commit/6cbee8d65e71abac851c4492fea987ad080580bd)\n
  \n\n### Workarounds\n\nFor deployments where editing the installed jupyter_server
  is impractical (containerized builds, read-only images), adding this to jupyter_server_config.py
  has the same effect as the patch above without touching source files:\n\n```\nimport
  jupyter_server.nbconvert.handlers as _nb\n\ndef _csp(self):\n    return super(type(self),
  self).content_security_policy + \"; sandbox allow-scripts\"\n\n_nb.NbconvertFileHandler.content_security_policy
  = property(_csp)\n_nb.NbconvertPostHandler.content_security_policy = property(_csp)\n\
  ```"
