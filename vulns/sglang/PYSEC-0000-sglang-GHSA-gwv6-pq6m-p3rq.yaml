summary: 'SGLanG: Multimodal scheduler deserializes untrusted pickle data on 0.0.0.0
  ROUTER socket'
details: SGLang's multimodal generation runtime scheduler's ROUTER socket binds to
  0.0.0.0 by default and contains a sink that calls pickle.loads() on incoming messages,
  enabling RCE when exposed to the internet.
