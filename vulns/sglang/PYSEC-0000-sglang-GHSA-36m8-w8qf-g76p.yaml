summary: 'SGLang: Unauthenticated RCE via --enable-custom-logit-processor'
details: SGLang's multimodal generation runtime is vulnerable to unauthenticated remote
  code execution when the --enable-custom-logit-processor option is enabled, as Python
  objects loaded via dill.loads() will be deserialized without validation.
