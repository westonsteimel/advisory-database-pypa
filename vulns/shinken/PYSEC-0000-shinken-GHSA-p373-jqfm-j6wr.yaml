summary: Shinken Solutions Shinken Monitoring vulnerable to Incorrect Access Control
details: Shinken Solutions Shinken Monitoring Version 2.4.3 affected is vulnerable
  to Incorrect Access Control. The `SafeUnpickler` class found in `shinken/safepickle.py`
  implements a weak authentication scheme when unserializing objects passed from monitoring
  nodes to the Shinken monitoring server.
