summary: Agno is vulnerable to Eval Injection
details: Agno versions prior to 2.3.24 contain an arbitrary code execution vulnerability
  in the model execution component that allows attackers to execute arbitrary Python
  code by manipulating the field_type parameter passed to eval(). Attackers can influence
  the field_type value in a FunctionCall to achieve remote code execution.
