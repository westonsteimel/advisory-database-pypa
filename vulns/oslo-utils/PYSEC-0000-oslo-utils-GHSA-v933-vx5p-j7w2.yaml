id: PYSEC-0000-oslo-utils-GHSA-v933-vx5p-j7w2
summary: OpenStack Oslo utility sensitive information exposure via log files
details: The strutils.mask_password function in the OpenStack Oslo utility library,
  Cinder, Nova, and Trove before 2013.2.4 and 2014.1 before 2014.1.3 does not properly
  mask passwords when logging commands, which allows local users to obtain passwords
  by reading the log.
