id: PYSEC-0000-horizon-GHSA-vxvf-xvm3-p8j5
summary: OpenStack Horizon has Incorrect Behavior Order
details: An issue was discovered in OpenStack Horizon 25.6 and 25.7 before 25.7.3.
  There is a write operation to the session storage backend before authentication
  and thus storage can be exhausted by unauthenticated requests. This is a regression
  of the CVE-2014-8124 fix.
