summary: FireFighter has unauthenticated SSRF in its Raid jira_bot endpoint that allows
  IAM credential theft
details: "### Impact\n  The `POST /api/v2/firefighter/raid/jira_bot` endpoint (`CreateJiraBotView`)
  is\n  reachable without authentication (`permission_classes = [permissions.AllowAny]`).\n\
  \  Its `attachments` payload is fetched server-side via `httpx.get()` with no URL\n\
  \  validation, then uploaded as an attachment on the Jira ticket that gets created.\n\
  \n  An unauthenticated caller able to reach the ingress can coerce the pod into\n\
  \  fetching arbitrary URLs â€” including the cloud metadata endpoint at\n  `http://169.254.169.254/`
  â€” and exfiltrate the response as a Jira attachment.\n\n  On EC2/EKS deployments
  that do not enforce IMDSv2, this allows theft of the\n  temporary AWS credentials
  attached to the pod's IAM role. The docstring on the\n  view claims a Bearer token
  is required, but the code does not enforce it.\n\n  Affected code paths:\n  - `src/firefighter/raid/views/__init__.py`
  â€” `CreateJiraBotView`\n  - `src/firefighter/raid/serializers.py` â€” `LandbotIssueRequestSerializer.attachments`\n\
  \  - `src/firefighter/raid/client.py` â€” `RaidJiraClient.add_attachments_to_issue`\n\
  \n  ### Patches\n  Fixed in `firefighter-incident` `0.0.54`:\n  - `CreateJiraBotView`
  now enforces `BearerTokenAuthentication` + `IsAuthenticated`.\n  - `attachments`
  URLs are validated: http(s) scheme only, max 10 URLs, rejection\n    of any host
  resolving to a private, loopback, link-local, reserved, multicast\n    or unspecified
  IP (IPv4 and IPv6).\n  - Fixes an unrelated `KeyError('attachments')` surfaced during
  regression testing.\n\n  Users should upgrade to `0.0.54` or later.\n\n  ### Workarounds\n\
  \  Until upgrade is possible, any one of the following blocks end-to-end exploitation:\n\
  \  - Restrict ingress access to `/api/v2/firefighter/raid/jira_bot` to trusted\n\
  \    networks only (VPN, internal load balancer).\n  - Rotate or revoke the Jira
  API token configured as `RAID_JIRA_API_PASSWORD`;\n    this breaks `jira.create_issue()`
  before the vulnerable attachment fetch is\n    reached (legitimate traffic is also
  blocked â€” emergency mitigation only).\n  - Enforce IMDSv2 with `HttpPutResponseHopLimit=1`
  on EC2/EKS nodes. This does\n    not fix the SSRF itself but neutralises the IAM-credential-theft
  path.\n\n  ### Resources\n  - CWE-918: Server-Side Request Forgery\n  - CWE-306:
  Missing Authentication for Critical Function"
