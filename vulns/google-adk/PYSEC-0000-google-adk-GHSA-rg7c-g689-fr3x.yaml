summary: Google Agent Development Kit (ADK) has a Code Injection and Missing Authentication
  vulnerability
details: "A Code Injection and Missing Authentication vulnerability in Google Agent
  Development Kit (ADK) versions 1.7.0 (and 2.0.0a1) through 1.28.1 (and 2.0.0a2)
  on Python (OSS), Cloud Run, and GKE allows an unauthenticated remote attacker to
  execute arbitrary code on the server hosting the ADK instance.\n\nThis vulnerability
  was patched in versions 1.28.1 and 2.0.0a2.\n\n\nCustomers need to redeploy the
  upgraded ADK to their production environments. In addition, if they are running
  ADK Web locally, they also need to upgrade their local instance."
