id: PYSEC-0000-apache-airflow-GHSA-cff3-5qrp-hqx7
summary: Apache Airflow Improper Preservation of Permissions vulnerability
details: "Improper Preservation of Permissions vulnerability in Apache Airflow. This\
  \ issue affects Apache Airflow from 2.8.2 through 2.8.3.\n\nAirflow's local file\
  \ task handler in Airflow incorrectly set permissions for all parent folders of\
  \ log folder, in default configuration adding write access to Unix group\_of the\
  \ folders. In the case Airflow is run with the root user (not recommended) it added\
  \ group write permission to all folders up to the root of the filesystem.\n\nIf\
  \ your log files are stored in the home directory, these permission changes might\
  \ impact your ability to run SSH operations after your home directory becomes group-writeable.\n\
  \nThis issue does not affect users who use or extend Airflow using Official Airflow\
  \ Docker reference images ( https://hub.docker.com/r/apache/airflow/ ) - those images\
  \ require to have group write permission set anyway.\n\nYou are affected only if\
  \ you install Airflow using local installation / virtualenv or other Docker images,\
  \ but the issue has no impact if docker containers are used as intended, i.e. where\
  \ Airflow components do not share containers with other applications and users.\n\
  \nAlso you should not be affected if your umask is 002 (group write enabled) - this\
  \ is the default on many linux systems.\n\nRecommendation for users using Airflow\
  \ outside of the containers:\n\n  *  if you are using root to run Airflow, change\
  \ your Airflow user to use non-root\n  *  upgrade Apache Airflow to 2.8.4 or above\n\
  \  *  If you prefer not to upgrade, you can change the  https://airflow.apache.org/docs/apache-airflow/stable/configurations-ref.html#file-task-handler-new-folder-permissions\
  \ \_to 0o755 (original value 0o775).\n  *  if you already ran Airflow tasks before\
  \ and your default umask is 022 (group write disabled) you should stop Airflow components,\
  \ check permissions of AIRFLOW_HOME/logs\_in all your components and all parent\
  \ directories of this directory and remove group write access for all the parent\
  \ directories"
