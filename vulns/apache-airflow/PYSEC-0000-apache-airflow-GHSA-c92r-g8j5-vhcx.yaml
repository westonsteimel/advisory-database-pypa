summary: 'Apache Airflow: JWT token still valid after logout'
details: "When user logged out, the JWT token the user had authtenticated with was
  not invalidated, which could lead to reuse of that token in case it was intercepted.
  In Airflow 3.2 we implemented the mechanism that implements token invalidation at
  logout. Users who are concerned about the logout scenario and possibility of intercepting
  the tokens, should upgrade to Airflow 3.2+\n\n\n\nUsers are recommended to upgrade
  to version 3.2.0, which fixes this issue."
