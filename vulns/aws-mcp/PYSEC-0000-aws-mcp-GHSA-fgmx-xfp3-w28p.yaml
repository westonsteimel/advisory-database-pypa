summary: aws-mcp has a Command Injection Remote Code Execution Vulnerability
details: "aws-mcp-server AWS CLI Command Injection Remote Code Execution Vulnerability.
  This vulnerability allows remote attackers to execute arbitrary code on affected
  installations of aws-mcp-server. Authentication is not required to exploit this
  vulnerability.\n\nThe specific flaw exists within the handling of the allowed commands
  list. The issue results from the lack of proper validation of a user-supplied string
  before using it to execute a system call. An attacker can leverage this vulnerability
  to execute code in the context of the MCP server. Was ZDI-CAN-27969."
