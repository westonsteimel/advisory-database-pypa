id: PYSEC-0000-langchain-community-GHSA-f2jm-rw3h-6phg
summary: LangChain pickle deserialization of untrusted data
details: A vulnerability in the `FAISS.deserialize_from_bytes` function of langchain-ai/langchain
  allows for pickle deserialization of untrusted data. This can lead to the execution
  of arbitrary commands via the `os.system` function. The issue affects versions prior
  to 0.2.4.
