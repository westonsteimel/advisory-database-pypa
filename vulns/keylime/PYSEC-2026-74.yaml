details: A flaw was found in Keylime. The Keylime registrar, since version 7.12.0,
  does not enforce client-side Transport Layer Security (TLS) authentication. This
  authentication bypass vulnerability allows unauthenticated clients with network
  access to perform administrative operations, including listing agents, retrieving
  public Trusted Platform Module (TPM) data, and deleting agents, by connecting without
  presenting a client certificate.
