summary: TkEasyGUI Vulnerable to OS Command Injection
details: Improper neutralization of special elements used in an OS command ('OS Command
  Injection') issue exists in TkEasyGUI versions prior to v1.0.22. If this vulnerability
  is exploited, an arbitrary OS command may be executed by a remote unauthenticated
  attacker if the settings are configured to construct messages from external sources.
