id: PYSEC-0000-mobsf-GHSA-8m9j-2f32-2vx4
summary: MobSF vulnerable to Open Redirect in Login Redirect
details: "### Impact\n_What kind of vulnerability is it? Who is impacted?_\n\nAn open\
  \ redirect vulnerability exist in MobSF authentication view. \n\nPoC\n1. Go to http://127.0.0.1:8000/login/?next=//afine.com\
  \ in a web browser.\n2. Enter credentials and press \"Sign In\".\n3. You will be\
  \ redirected to [afine.com](http://afine.com/)\n\nUsers who are not using authentication\
  \ are not impacted.\n\n### Patches\n_Has the problem been patched? What versions\
  \ should users upgrade to?_\n\nUpdate to MobSF v4.0.5\n\n### Workarounds\n_Is there\
  \ a way for users to fix or remediate the vulnerability without upgrading?_\nDisable\
  \ Authentication\n\n### References\n_Are there any links users can visit to find\
  \ out more?_\nFix: https://github.com/MobSF/Mobile-Security-Framework-MobSF/commit/fdaad81314f393d324c1ede79627e9d47986c8c8\n\
  \n### Reporter\nMarcin W\u0119g\u0142owski (AFINE Team)\n"
