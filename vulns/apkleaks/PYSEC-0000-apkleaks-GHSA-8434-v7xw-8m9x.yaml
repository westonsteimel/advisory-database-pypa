summary: Improper Neutralization of Argument Delimiters in a Decompiling Package Process
  in APKLeaks
details: "APKLeaks prior to v2.0.4 allows remote authenticated attackers to execute
  arbitrary OS commands via package name inside the application manifest.\n\n### Impact\n
  \nAn authenticated attacker could include arguments that allow unintended commands
  or code to be executed, allow sensitive data to be read or modified, or could cause
  other unintended behavior through malicious package names.\n\n\n### References\n
  \n- a966e781499ff6fd4eea66876d7532301b13a382\n\n### For more information\n\nIf you
  have any questions or comments about this advisory:\n* Email me at [me@dw1.io](mailto:me@dw1.io)\n"
